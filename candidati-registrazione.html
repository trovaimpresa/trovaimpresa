<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione Candidato - TrovaImpresa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        .progress-bar {
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            margin: 30px 0;
        }
        .progress-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        .step-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #e9ecef;
            border: 3px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #666;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }
        .step-circle.active {
            background: #28a745;
            border-color: #28a745;
            color: white;
            transform: scale(1.1);
        }
        .step-circle.completed {
            background: #28a745;
            border-color: #28a745;
            color: white;
        }
        .step-circle.completed::after {
            content: "✓";
            font-size: 24px;
        }
        .step-circle.completed {
            font-size: 0;
        }
        .step-label {
            font-size: 12px;
            color: #666;
            text-align: center;
            font-weight: 600;
        }
        .step-label.active {
            color: #28a745;
        }
        .form-content {
            padding: 40px 30px;
        }
        .form-step {
            display: none;
        }
        .form-step.active {
            display: block;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .step-title {
            font-size: 20px;
            font-weight: 700;
            color: #333;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }
        label .required {
            color: #FF6B35;
        }
        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        input[type="number"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #28a745;
            box-shadow: 0 0 0 3px rgba(40, 167, 69, 0.1);
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .geo-button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            margin-top: 5px;
            transition: background 0.3s ease;
        }
        .geo-button:hover {
            background: #0052a3;
        }
        .geo-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        .btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-prev {
            background: #e9ecef;
            color: #333;
        }
        .btn-prev:hover {
            background: #dee2e6;
        }
        .btn-next {
            background: #28a745;
            color: white;
        }
        .btn-next:hover {
            background: #218838;
        }
        .btn-submit {
            background: #FF6B35;
            color: white;
            width: 100%;
        }
        .btn-submit:hover {
            background: #e55a25;
        }
        .file-input-wrapper {
            margin-bottom: 20px;
        }
        .file-input-label {
            display: block;
            padding: 20px;
            border: 2px dashed #28a745;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f0f8f4;
        }
        .file-input-label:hover {
            background: #e8f5e9;
            border-color: #20c997;
        }
        .file-input-label input {
            display: none;
        }
        .file-name {
            font-size: 13px;
            color: #28a745;
            margin-top: 8px;
        }
        .error-message {
            color: #FF6B35;
            font-size: 13px;
            margin-top: 5px;
        }
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🔍 Registrazione Candidato</h1>
        <p>Trova il lavoro che fa per te</p>
    </div>

    <div class="progress-bar">
        <div class="progress-step">
            <div class="step-circle active" id="circle-1">1</div>
            <div class="step-label active">Dati Personali</div>
        </div>
        <div class="progress-step">
            <div class="step-circle" id="circle-2">2</div>
            <div class="step-label">Professione</div>
        </div>
        <div class="progress-step">
            <div class="step-circle" id="circle-3">3</div>
            <div class="step-label">Contatti</div>
        </div>
        <div class="progress-step">
            <div class="step-circle" id="circle-4">4</div>
            <div class="step-label">Documenti</div>
        </div>
    </div>

    <div class="form-content">
        <div class="success-message" id="successMsg">
            ✅ Profilo salvato con successo! Verrai reindirizzato tra 2 secondi...
        </div>

        <form id="candidatiForm">
            <!-- STEP 1: Dati Personali -->
            <div class="form-step active" id="step-1">
                <div class="step-title">Dati Personali</div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="nome">Nome <span class="required">*</span></label>
                        <input type="text" id="nome" name="nome" placeholder="Es. Mario" required>
                    </div>
                    <div class="form-group">
                        <label for="cognome">Cognome <span class="required">*</span></label>
                        <input type="text" id="cognome" name="cognome" placeholder="Es. Rossi" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="eta">Età <span class="required">*</span></label>
                        <input type="number" id="eta" name="eta" min="18" max="100" placeholder="Es. 35" required>
                    </div>
                    <div class="form-group">
                        <label for="sesso">Sesso <span class="required">*</span></label>
                        <select id="sesso" name="sesso" required>
                            <option value="">-- Seleziona --</option>
                            <option value="Uomo">Uomo</option>
                            <option value="Donna">Donna</option>
                            <option value="Altro">Preferirei non specificare</option>
                        </select>
                    </div>
                </div>

                <div class="buttons">
                    <button type="button" class="btn btn-next" onclick="nextStep()">Avanti →</button>
                </div>
            </div>

            <!-- STEP 2: Professione -->
            <div class="form-step" id="step-2">
                <div class="step-title">La tua Professione</div>

                <div class="form-group">
                    <label for="mestiere">Mestiere/Qualifica <span class="required">*</span></label>
                    <input type="text" id="mestiere" name="mestiere" placeholder="Es. Muratore, Elettricista, Piastrellista..." required>
                </div>

                <div class="form-group">
                    <label for="livello">Livello <span class="required">*</span></label>
                    <select id="livello" name="livello" required>
                        <option value="">-- Seleziona --</option>
                        <option value="Apprendista">Apprendista</option>
                        <option value="Specializzato">Specializzato</option>
                        <option value="Capo cantiere">Capo cantiere</option>
                        <option value="Titolare azienda">Titolare azienda</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="citta">Città <span class="required">*</span></label>
                    <input type="text" id="citta" name="citta" placeholder="Es. Roma" required>
                    <button type="button" class="geo-button" id="geoBtn" onclick="geolocalizzaCandidato()">📍 Localizzami</button>
                </div>

                <div class="buttons">
                    <button type="button" class="btn btn-prev" onclick="prevStep()">← Indietro</button>
                    <button type="button" class="btn btn-next" onclick="nextStep()">Avanti →</button>
                </div>
            </div>

            <!-- STEP 3: Contatti -->
            <div class="form-step" id="step-3">
                <div class="step-title">I tuoi Contatti</div>

                <div class="form-group">
                    <label for="telefono">Telefono <span class="required">*</span></label>
                    <input type="tel" id="telefono" name="telefono" placeholder="Es. +39 333 1234567" required>
                </div>

                <div class="form-group">
                    <label for="email">Email <span class="required">*</span></label>
                    <input type="email" id="email" name="email" placeholder="Es. mario.rossi@email.com" required>
                </div>

                <div class="form-group">
                    <label for="descrizione">Descrizione (opzionale)</label>
                    <textarea id="descrizione" name="descrizione" placeholder="Raccontaci di te, la tua esperienza, specialità..."></textarea>
                </div>

                <div class="buttons">
                    <button type="button" class="btn btn-prev" onclick="prevStep()">← Indietro</button>
                    <button type="button" class="btn btn-next" onclick="nextStep()">Avanti →</button>
                </div>
            </div>

            <!-- STEP 4: Documenti -->
            <div class="form-step" id="step-4">
                <div class="step-title">Documenti (opzionali)</div>

                <div class="form-group">
                    <label>Foto Profilo (JPG, PNG - Max 5MB)</label>
                    <div class="file-input-wrapper">
                        <label class="file-input-label">
                            <input type="file" id="foto" name="foto" accept="image/jpeg,image/png">
                            <div>📷 Carica una foto profilo</div>
                            <div class="file-name" id="fotoName"></div>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Curriculum Vitae (PDF, DOC, DOCX - Max 10MB)</label>
                    <div class="file-input-wrapper">
                        <label class="file-input-label">
                            <input type="file" id="curriculum" name="curriculum" accept=".pdf,.doc,.docx">
                            <div>📄 Carica il tuo CV</div>
                            <div class="file-name" id="cvName"></div>
                        </label>
                    </div>
                </div>

                <div class="buttons">
                    <button type="button" class="btn btn-prev" onclick="prevStep()">← Indietro</button>
                    <button type="submit" class="btn btn-submit">✅ Salva Profilo</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
    const { createClient } = window.supabase;
    const SUPABASE_URL = 'https://nacvrsgkyfavykxjxszu.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hY3Zyc2dreWZhdnlreGp4c3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTczNTYsImV4cCI6MjA4OTE3MzM1Nn0.o5S0HeDtG-hlCo1zfk4ILqtog7MT8_2B0EyjdiVzBic';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentStep = 1;

    // Navigazione step
    function nextStep() {
        if (validateStep(currentStep)) {
            currentStep++;
            updateStep();
        } else {
            alert('Per favore, compila tutti i campi obbligatori.');
        }
    }

    function prevStep() {
        currentStep--;
        updateStep();
    }

    function updateStep() {
        // Nascondi tutti gli step
        document.querySelectorAll('.form-step').forEach(step => step.classList.remove('active'));
        document.querySelectorAll('.step-circle').forEach(circle => circle.classList.remove('active'));
        document.querySelectorAll('.step-label').forEach(label => label.classList.remove('active'));

        // Mostra lo step attuale
        document.getElementById(`step-${currentStep}`).classList.add('active');
        document.getElementById(`circle-${currentStep}`).classList.add('active');
        document.querySelector(`.progress-step:nth-child(${currentStep}) .step-label`).classList.add('active');

        // Aggiorna i cerchi completati
        for (let i = 1; i < currentStep; i++) {
            document.getElementById(`circle-${i}`).classList.add('completed');
        }
    }

    function validateStep(step) {
        if (step === 1) {
            return document.getElementById('nome').value && 
                   document.getElementById('cognome').value && 
                   document.getElementById('eta').value && 
                   document.getElementById('sesso').value;
        } else if (step === 2) {
            return document.getElementById('mestiere').value && 
                   document.getElementById('livello').value && 
                   document.getElementById('citta').value;
        } else if (step === 3) {
            return document.getElementById('telefono').value && 
                   document.getElementById('email').value;
        }
        return true;
    }

    // Geolocalizzazione
    function geolocalizzaCandidato() {
        const btn = document.getElementById('geoBtn');
        btn.disabled = true;
        btn.innerText = '⏳ Localizzazione...';

        if (!navigator.geolocation) {
            alert('Geolocalizzazione non supportata dal browser.');
            btn.disabled = false;
            btn.innerText = '📍 Localizzami';
            return;
        }

        navigator.geolocation.getCurrentPosition(
            async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                try {
                    const response = await fetch(
                        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
                    );
                    const data = await response.json();
                    const citta = data.address.city || data.address.town || data.address.village || 'Sconosciuto';
                    document.getElementById('citta').value = citta;
                    btn.innerText = '✅ Localizzato!';
                    setTimeout(() => {
                        btn.disabled = false;
                        btn.innerText = '📍 Localizzami';
                    }, 2000);
                } catch (error) {
                    console.error('Errore geolocalizzazione:', error);
                    alert('Errore nella geolocalizzazione. Inserisci manualmente la città.');
                    btn.disabled = false;
                    btn.innerText = '📍 Localizzami';
                }
            },
            (error) => {
                console.error('Errore GPS:', error);
                alert('Accedi ai permessi di localizzazione.');
                btn.disabled = false;
                btn.innerText = '📍 Localizzami';
            }
        );
    }

    // Visualizza nome file
    document.getElementById('foto').addEventListener('change', (e) => {
        const name = e.target.files[0]?.name || '';
        document.getElementById('fotoName').innerText = name;
    });

    document.getElementById('curriculum').addEventListener('change', (e) => {
        const name = e.target.files[0]?.name || '';
        document.getElementById('cvName').innerText = name;
    });

    // Submit form
    document.getElementById('candidatiForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = {
            nome: document.getElementById('nome').value,
            cognome: document.getElementById('cognome').value,
            eta: parseInt(document.getElementById('eta').value),
            sesso: document.getElementById('sesso').value,
            mestiere: document.getElementById('mestiere').value,
            livello: document.getElementById('livello').value,
            citta: document.getElementById('citta').value,
            telefono: document.getElementById('telefono').value,
            email: document.getElementById('email').value,
            descrizione: document.getElementById('descrizione').value || null,
            data_registrazione: new Date().toISOString()
        };

        try {
            const { data, error } = await supabase
                .from('candidati_lavoro')
                .insert([formData]);

            if (error) {
                console.error('Errore Supabase:', error);
                alert('❌ Errore nel salvataggio. Riprova.');
            } else {
                document.getElementById('successMsg').classList.add('show');
                setTimeout(() => {
                    window.location.href = '/grazie.html';
                }, 2000);
            }
        } catch (error) {
            console.error('Errore:', error);
            alert('❌ Errore sconosciuto. Riprova.');
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</body>
</html>
