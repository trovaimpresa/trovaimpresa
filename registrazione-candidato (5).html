<!DOCTYPE html>
<html lang="it" style="background: linear-gradient(135deg, #2a7a4b 0%, #1a4d2e 100%); min-height: 100vh;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrazione Candidato - TrovaImpresa</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      background: #1a4d2e !important;
      background-image: linear-gradient(135deg, #2a7a4b 0%, #1a4d2e 100%) !important;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: 40px auto;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .header {
      background: linear-gradient(135deg, #2a7a4b 0%, #1a4d2e 100%);
      color: white;
      padding: 32px 24px;
      text-align: center;
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .steps {
      display: flex;
      justify-content: space-between;
      padding: 24px;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e0e0;
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .step-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      background: #e0e0e0;
      color: #666;
      font-size: 16px;
    }

    .step.active .step-circle {
      background: #2a7a4b;
      color: white;
    }

    .step-label {
      font-size: 12px;
      color: #999;
      text-align: center;
    }

    .step.active .step-label {
      color: #2a7a4b;
      font-weight: 600;
    }

    .content {
      padding: 32px;
    }

    .form-section {
      display: none;
    }

    .form-section.active {
      display: block;
    }

    .form-section h2 {
      font-size: 20px;
      color: #333;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #333;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #2a7a4b;
      box-shadow: 0 0 0 3px rgba(42, 122, 75, 0.1);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 32px;
    }

    .btn-back {
      flex: 1;
      padding: 14px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: #e0e0e0;
      color: #333;
      transition: all 0.3s;
    }

    .btn-back:hover {
      background: #d0d0d0;
    }

    .btn-next {
      flex: 1;
      padding: 14px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: #2a7a4b;
      color: white;
      transition: all 0.3s;
    }

    .btn-next:hover {
      background: #1a4d2e;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(42, 122, 75, 0.3);
    }

    .btn-next:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .required {
      color: #ff6b6b;
    }
  </style>
</head>
<body style="background: linear-gradient(135deg, #2a7a4b 0%, #1a4d2e 100%); min-height: 100vh; padding: 20px; margin: 0;">
  <div style="text-align:center; color:white; font-size:11px; margin-bottom:8px; opacity:0.7;">v3</div>
  <div class="container">
    <div class="header">
      <h1>🔍 Registrazione Candidato</h1>
      <p>Trova il lavoro che fa per te</p>
    </div>

    <div class="steps">
      <div class="step active" id="step-1-indicator">
        <div class="step-circle">1</div>
        <div class="step-label">Dati Personali</div>
      </div>
      <div class="step" id="step-2-indicator">
        <div class="step-circle">2</div>
        <div class="step-label">Professione</div>
      </div>
      <div class="step" id="step-3-indicator">
        <div class="step-circle">3</div>
        <div class="step-label">Contatti</div>
      </div>
      <div class="step" id="step-4-indicator">
        <div class="step-circle">4</div>
        <div class="step-label">Documenti</div>
      </div>
    </div>

    <div class="content">
      <!-- STEP 1 -->
      <div class="form-section active" id="step-1">
        <h2>Dati Personali</h2>
        <div class="form-row">
          <div class="form-group">
            <label>Nome <span class="required">*</span></label>
            <input type="text" id="nome" placeholder="Es. Mario">
          </div>
          <div class="form-group">
            <label>Cognome <span class="required">*</span></label>
            <input type="text" id="cognome" placeholder="Es. Rossi">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Età <span class="required">*</span></label>
            <input type="number" id="eta" placeholder="Es. 35" min="18" max="100">
          </div>
          <div class="form-group">
            <label>Sesso <span class="required">*</span></label>
            <select id="sesso">
              <option value="">-- Seleziona --</option>
              <option value="Uomo">Uomo</option>
              <option value="Donna">Donna</option>
              <option value="Altro">Altro</option>
            </select>
          </div>
        </div>
      </div>

      <!-- STEP 2 -->
      <div class="form-section" id="step-2">
        <h2>Professione</h2>
        <div class="form-group">
          <label>Mestiere <span class="required">*</span></label>
          <input type="text" id="mestiere" placeholder="Es. Idraulico, Muratore, Elettricista...">
        </div>
        <div class="form-group">
          <label>Anni di Esperienza <span class="required">*</span></label>
          <input type="number" id="anni_esperienza" placeholder="Es. 5" min="0" max="60">
        </div>
        <div class="form-group">
          <label>Descrizione Competenze</label>
          <textarea id="competenze" placeholder="Descrivi le tue competenze e specializzazioni..."></textarea>
        </div>
      </div>

      <!-- STEP 3 -->
      <div class="form-section" id="step-3">
        <h2>Contatti</h2>
        <div class="form-group">
          <label>Email <span class="required">*</span></label>
          <input type="email" id="email" placeholder="mario@example.com">
        </div>
        <div class="form-group">
          <label>Telefono <span class="required">*</span></label>
          <input type="tel" id="telefono" placeholder="+39 123 456 7890">
        </div>
        <div class="form-group">
          <label>Città <span class="required">*</span></label>
          <input type="text" id="citta" placeholder="Roma">
        </div>
        <div class="form-group">
          <label>Password <span class="required">*</span></label>
          <input type="password" id="password" placeholder="Almeno 8 caratteri">
        </div>
      </div>

      <!-- STEP 4 -->
      <div class="form-section" id="step-4">
        <h2>Documenti (Opzionale)</h2>
        <div class="form-group">
          <label>Curriculum</label>
          <textarea id="cv" placeholder="Incolla qui il tuo curriculum..." style="min-height: 150px;"></textarea>
        </div>
        <div class="form-group">
          <label>Certificazioni</label>
          <textarea id="certificazioni" placeholder="Descrivi eventuali certificazioni..."></textarea>
        </div>
        <div class="form-group">
          <label style="display: flex; gap: 8px; align-items: center; cursor: pointer;">
            <input type="checkbox" id="termini" style="width: auto;">
            <span>Accetto i Termini di Servizio <span class="required">*</span></span>
          </label>
        </div>
      </div>

      <!-- BUTTONS -->
      <div class="buttons">
        <button class="btn-back" id="btn-back" style="display:none;">← Indietro</button>
        <button class="btn-next" id="btn-next">Avanti →</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://nacvrsgkyfavykxjxszu.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hY3Zyc2dreWZhdnlreGp4c3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTczNTYsImV4cCI6MjA4OTE3MzM1Nn0.o5S0HeDtG-hlCo1zfk4ILqtog7MT8_2B0EyjdiVzBic';

    let currentStep = 1;

    function goToStep(step) {
      document.querySelectorAll('.form-section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));

      document.getElementById('step-' + step).classList.add('active');
      document.getElementById('step-' + step + '-indicator').classList.add('active');

      document.getElementById('btn-back').style.display = step === 1 ? 'none' : 'block';

      var btnNext = document.getElementById('btn-next');
      btnNext.textContent = step === 4 ? '✓ Completa Registrazione' : 'Avanti →';

      currentStep = step;
    }

    function nextStep() {
      if (currentStep < 4) {
        goToStep(currentStep + 1);
      } else {
        submitForm();
      }
    }

    function prevStep() {
      if (currentStep > 1) {
        goToStep(currentStep - 1);
      }
    }

    document.getElementById('btn-next').addEventListener('click', nextStep);
    document.getElementById('btn-back').addEventListener('click', prevStep);

    async function submitForm() {
      if (!document.getElementById('termini').checked) {
        alert('Devi accettare i termini di servizio!');
        return;
      }

      var dati = {
        nome: document.getElementById('nome').value,
        cognome: document.getElementById('cognome').value,
        eta: document.getElementById('eta').value || null,
        sesso: document.getElementById('sesso').value,
        mestiere: document.getElementById('mestiere').value,
        anni_esperienza: document.getElementById('anni_esperienza').value || null,
        competenze: document.getElementById('competenze').value,
        email: document.getElementById('email').value,
        telefono: document.getElementById('telefono').value,
        citta: document.getElementById('citta').value,
        password: document.getElementById('password').value,
        cv: document.getElementById('cv').value,
        certificazioni: document.getElementById('certificazioni').value,
        created_at: new Date().toISOString()
      };

      var btnNext = document.getElementById('btn-next');
      btnNext.disabled = true;
      btnNext.textContent = '⏳ Registrazione in corso...';

      try {
        var res = await fetch(SUPABASE_URL + '/rest/v1/candidati_lavoro', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY,
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify(dati)
        });

        if (!res.ok) {
          var errText = await res.text();
          throw new Error('Errore ' + res.status + ': ' + errText);
        }

        window.location.href = 'grazie.html';
      } catch (err) {
        console.error('Errore:', err);
        btnNext.disabled = false;
        btnNext.textContent = '✓ Completa Registrazione';
        alert('Errore durante la registrazione: ' + err.message);
      }
    }
  </script>
</body>
</html>
