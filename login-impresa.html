<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accedi - TrovaImpresa</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: linear-gradient(135deg, #1a4d2e 0%, #2a7a4b 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: white; margin-bottom: 32px; text-align: center; }
    .logo span { color: #FF6B35; }
    .card { background: white; border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .card h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: #1a4d2e; margin-bottom: 6px; }
    .card p { font-size: 0.9rem; color: #888; margin-bottom: 28px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #333; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 13px 14px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 0.95rem; font-family: inherit; color: #333; transition: border-color 0.2s; }
    .form-group input:focus { outline: none; border-color: #2a7a4b; box-shadow: 0 0 0 3px rgba(42,122,75,0.1); }
    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 44px; }
    .toggle-pw { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #aaa; padding: 0; display: flex; align-items: center; }
    .toggle-pw:hover { color: #2a7a4b; }
    .btn-login { width: 100%; padding: 14px; background: #2a7a4b; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.2s; margin-top: 8px; }
    .btn-login:hover { background: #1a4d2e; transform: translateY(-2px); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .errore { display: none; background: #fff0f0; border: 1px solid #ffcccc; color: #cc0000; border-radius: 8px; padding: 12px; font-size: 0.85rem; margin-bottom: 16px; text-align: center; }
    .divider { text-align: center; color: #bbb; font-size: 0.85rem; margin: 20px 0; position: relative; }
    .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: #eee; }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .links { display: flex; flex-direction: column; gap: 10px; text-align: center; }
    .links a { color: #2a7a4b; text-decoration: none; font-size: 0.88rem; font-weight: 600; }
    .links a:hover { text-decoration: underline; }
    .links .link-pro { color: #1a73e8; }
    .back { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.85rem; margin-top: 20px; }
    .back:hover { color: white; }
  </style>
</head>
<body>

  <div class="logo">Trova<span>Impresa</span></div>

  <div class="card">
    <h1>👋 Bentornato!</h1>
    <p>Accedi al tuo pannello impresa</p>

    <div class="errore" id="errore"></div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="mario@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="password-wrapper">
        <input type="password" id="password" placeholder="La tua password" autocomplete="current-password">
        <button class="toggle-pw" type="button" onclick="togglePassword()" tabindex="-1">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button type="button" class="btn-login" id="btn-login" onclick="doLogin()">🔐 Accedi</button>

    <div class="divider">oppure</div>

    <div class="links">
      <a href="registrazione.html?piano=free">🆓 Registrati Free</a>
      <a href="info-pro.html" class="link-pro">⭐ Registrati Pro</a>
    </div>
  </div>

  <a href="index.html" class="back">← Torna alla home</a>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = supabase.createClient(
      'https://nacvrsgkyfavykxjxszu.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hY3Zyc2dreWZhdnlreGp4c3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTczNTYsImV4cCI6MjA4OTE3MzM1Nn0.o5S0HeDtG-hlCo1zfk4ILqtog7MT8_2B0EyjdiVzBic'
    );

    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });

    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    async function doLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const btn = document.querySelector('button');
      btn.disabled = true;
      btn.innerHTML = '⏳ Accesso in corso...';
      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) throw error;
        window.location.href = 'pannello-impresa.html';
      } catch(err) {
        alert('Errore: ' + err.message);
        btn.disabled = false;
        btn.innerHTML = '🔐 Accedi';
      }
    }
  </script>
  <script src="/cookie-banner.js"></script>
</body>
</html>
