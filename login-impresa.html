<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accedi - TrovaImpresa</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #1a4d2e 0%, #2a7a4b 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: white;
      margin-bottom: 32px;
      text-align: center;
    }
    .logo span { color: #FF6B35; }

    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .card h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: #1a4d2e;
      margin-bottom: 6px;
    }
    .card p {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 28px;
    }

    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 13px 14px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #333;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #2a7a4b;
      box-shadow: 0 0 0 3px rgba(42,122,75,0.1);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: #2a7a4b;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-login:hover { background: #1a4d2e; transform: translateY(-2px); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .errore {
      display: none;
      background: #fff0f0;
      border: 1px solid #ffcccc;
      color: #cc0000;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      text-align: center;
    }

    .divider {
      text-align: center;
      color: #bbb;
      font-size: 0.85rem;
      margin: 20px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: #eee;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-align: center;
    }
    .links a {
      color: #2a7a4b;
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 600;
    }
    .links a:hover { text-decoration: underline; }
    .links .link-free { color: #2a7a4b; }
    .links .link-pro { color: #1a73e8; }

    .password-wrapper {
      position: relative;
    }
    .password-wrapper input {
      padding-right: 44px;
    }
    .toggle-pw {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #aaa;
      padding: 0;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: #2a7a4b; }

    .back {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 0.85rem;
      margin-top: 20px;
    }
    .back:hover { color: white; }
  </style>
</head>
<body>

  <div class="logo">Trova<span>Impresa</span></div>

  <div class="card">
    <h1>👋 Bentornato!</h1>
    <p>Accedi al tuo pannello impresa</p>

    <div class="errore" id="errore">Email o password non corretti.</div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="mario@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="password-wrapper">
        <input type="password" id="password" placeholder="La tua password" autocomplete="current-password">
        <button class="toggle-pw" type="button" onclick="togglePassword('password', this)" tabindex="-1">
          <svg id="eye-password" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button type="button" class="btn-login" id="btn-login" onclick="login()">🔐 Accedi</button>

    <div class="divider">oppure</div>

    <div class="links">
      <a href="registrazione.html?piano=free" class="link-free">🆓 Registrati Free</a>
      <a href="info-pro.html" class="link-pro">⭐ Registrati Pro</a>
    </div>
  </div>

  <a href="index.html" class="back">← Torna alla home</a>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://nacvrsgkyfavykxjxszu.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hY3Zyc2dreWZhdnlreGp4c3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTczNTYsImV4cCI6MjA4OTE3MzM1Nn0.o5S0HeDtG-hlCo1zfk4ILqtog7MT8_2B0EyjdiVzBic';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Entra con Invio
    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') login();
    });

    function togglePassword(id, btn) {
      const input = document.getElementById(id);
      const svg = btn.querySelector('svg');
      if (input.type === 'password') {
        input.type = 'text';
        svg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
        btn.style.color = '#2a7a4b';
      } else {
        input.type = 'password';
        svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        btn.style.color = '#aaa';
      }
    }

    async function login() {
      const btn = document.getElementById('btn-login');
      if (btn.disabled) return;
      btn.disabled = true;
      btn.textContent = '⏳ Accesso in corso...';
      await new Promise(r => setTimeout(r, 0));
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errore = document.getElementById('errore');

      if (!email || !password) {
        errore.textContent = 'Inserisci email e password.';
        errore.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '🔐 Accedi';
        return;
      }

      errore.style.display = 'none';

      try {
        // Login con Supabase Auth (password cifrata, sicura)
        const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({ email, password });

        if (authError) {
          errore.textContent = 'Email o password non corretti.';
          errore.style.display = 'block';
          btn.disabled = false;
          btn.textContent = '🔐 Accedi';
          return;
        }

        // Recupera dati impresa dalla tabella
        const { data: imprese, error: impresaError } = await supabaseClient
          .from('imprese')
          .select('id, nome, piano')
          .eq('user_id', authData.user.id)
          .single();

        if (impresaError || !imprese) {
          errore.textContent = 'Profilo impresa non trovato. Completa la registrazione.';
          errore.style.display = 'block';
          btn.disabled = false;
          btn.textContent = '🔐 Accedi';
          return;
        }

        // Salva sessione in localStorage
        localStorage.setItem('impresa_id', imprese.id);
        localStorage.setItem('impresa_nome', imprese.nome || '');
        localStorage.setItem('piano_impresa', imprese.piano || 'free');

        // Vai al pannello
        window.location.href = 'pannello-impresa.html';

      } catch (err) {
        errore.textContent = 'Errore di connessione. Riprova.';
        errore.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '🔐 Accedi';
      }
    }
  </script>

<script src="/cookie-banner.js"></script>
</body>
</html>
