<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mappa Imprese – TrovaImpresa</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f7fa; color: #333; display: flex; flex-direction: column; height: 100vh; }

    /* ── NAVBAR ── */
    nav {
      background: #fff;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      flex-shrink: 0;
      z-index: 1000;
    }
    .logo { font-size: 1.4rem; font-weight: 700; text-decoration: none; }
    .logo .t { color: #2ecc71; }
    .logo .i { color: #e67e22; }
    .nav-links { display: flex; gap: 20px; align-items: center; }
    .nav-links a { color: #555; text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color .2s; }
    .nav-links a:hover { color: #2ecc71; }
    .nav-links .btn-reg {
      background: #2ecc71; color: #fff;
      padding: 8px 18px; border-radius: 8px;
      font-weight: 700; font-size: 0.85rem;
    }
    .nav-links .btn-reg:hover { background: #27ae60; color: #fff; }

    /* ── TOOLBAR ── */
    .toolbar {
      background: #fff;
      padding: 10px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
    }
    .toolbar-title {
      font-weight: 700;
      font-size: 1rem;
      color: #2c3e50;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #status-msg {
      font-size: 0.85rem;
      color: #888;
      margin-left: auto;
    }
    #status-msg.loading { color: #e67e22; }
    #status-msg.done { color: #2ecc71; font-weight: 600; }

    /* Search box */
    #search-box {
      padding: 7px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.88rem;
      width: 220px;
      outline: none;
      transition: border .2s;
    }
    #search-box:focus { border-color: #2ecc71; }

    /* ── MAP ── */
    #map {
      flex: 1;
      width: 100%;
      min-height: 0;
    }

    /* ── POPUP ── */
    .popup-nome {
      font-weight: 700;
      font-size: 1rem;
      color: #2c3e50;
      margin-bottom: 4px;
    }
    .popup-tipo {
      font-size: 0.8rem;
      color: #2ecc71;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 8px;
    }
    .popup-row {
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .popup-row a { color: #2ecc71; text-decoration: none; font-weight: 600; }
    .popup-row a:hover { text-decoration: underline; }
    .popup-btn {
      display: inline-block;
      margin-top: 10px;
      background: #2ecc71;
      color: #fff;
      padding: 7px 16px;
      border-radius: 7px;
      font-size: 0.82rem;
      font-weight: 700;
      text-decoration: none;
      transition: background .2s;
    }
    .popup-btn:hover { background: #27ae60; }

    /* Leaflet popup tweaks */
    .leaflet-popup-content-wrapper { border-radius: 12px; box-shadow: 0 6px 24px rgba(0,0,0,0.12); }
    .leaflet-popup-content { margin: 14px 18px; min-width: 200px; }

    /* Custom marker */
    .pin-dot {
      width: 14px; height: 14px;
      background: #2ecc71;
      border: 3px solid #fff;
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    @media (max-width: 600px) {
      nav { padding: 12px 16px; }
      .toolbar { padding: 8px 16px; }
      #search-box { width: 160px; }
      .nav-links { gap: 12px; }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <a href="/index.html" class="logo"><span class="t">Trova</span><span class="i">Impresa</span></a>
  <div class="nav-links">
    <a href="/cerca-imprese.html">Cerca imprese</a>
    <a href="/prezzi.html">Prezzi</a>
    <a href="/registrazione-artigiano.html" class="btn-reg">Registrati</a>
  </div>
</nav>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-title">🗺️ Mappa delle Imprese</div>
  <input type="text" id="search-box" placeholder="🔍 Filtra per nome o città…" oninput="filtraMarker(this.value)" />
  <span id="status-msg" class="loading">⏳ Caricamento imprese…</span>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const SUPA_URL = 'https://nacvrsgkyfavykxjxszu.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hY3Zyc2dreWZhdnlreGp4c3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTczNTYsImV4cCI6MjA4OTE3MzM1Nn0.o5S0HeDtG-hlCo1zfk4ILqtog7MT8_2B0EyjdiVzBic';

// Cache geocoding in sessionStorage per non ripetere le stesse richieste
const GEO_CACHE_KEY = 'ti_geo_cache';

function loadGeoCache() {
  try { return JSON.parse(sessionStorage.getItem(GEO_CACHE_KEY) || '{}'); } catch(e) { return {}; }
}
function saveGeoCache(cache) {
  try { sessionStorage.setItem(GEO_CACHE_KEY, JSON.stringify(cache)); } catch(e) {}
}

// ── MAPPA ────────────────────────────────────────────────────────────────────
const map = L.map('map').setView([42.5, 12.5], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 18
}).addTo(map);

// Icona personalizzata verde
const pinIcon = L.divIcon({
  className: '',
  html: '<div class="pin-dot"></div>',
  iconSize: [14, 14],
  iconAnchor: [7, 7],
  popupAnchor: [0, -10]
});

// ── STATO ────────────────────────────────────────────────────────────────────
let tuttiMarker = []; // { marker, nome, citta }
const statusEl = document.getElementById('status-msg');

// ── CARICA IMPRESE DA SUPABASE ───────────────────────────────────────────────
async function caricaImprese() {
  let tutte = [];
  let from = 0;
  const pageSize = 1000;

  // Paginazione: Supabase restituisce max 1000 righe per chiamata
  while (true) {
    const res = await fetch(
      `${SUPA_URL}/rest/v1/imprese?select=id,nome,ragione_sociale,nome_impresa,tipo,categoria,citta,provincia,indirizzo,via,telefono,email,sito_web&order=id.asc&limit=${pageSize}&offset=${from}`,
      { headers: { 'apikey': SUPA_KEY, 'Accept': 'application/json' } }
    );
    if (!res.ok) throw new Error('Errore Supabase: ' + res.status);
    const batch = await res.json();
    if (!batch || batch.length === 0) break;
    tutte = tutte.concat(batch);
    if (batch.length < pageSize) break;
    from += pageSize;
  }
  return tutte;
}

// ── GEOCODING con Nominatim (rate-limited: 1 req/s) ─────────────────────────
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function geocodifica(query) {
  const cache = loadGeoCache();
  if (cache[query]) return cache[query];

  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&countrycodes=it&format=json&limit=1`;
  try {
    const res = await fetch(url, {
      headers: { 'Accept-Language': 'it', 'User-Agent': 'TrovaImpresa/1.0' }
    });
    const data = await res.json();
    if (data && data.length > 0) {
      const result = { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
      cache[query] = result;
      saveGeoCache(cache);
      return result;
    }
  } catch(e) {}
  cache[query] = null;
  saveGeoCache(cache);
  return null;
}

// ── POPUP HTML ────────────────────────────────────────────────────────────────
function buildPopup(d) {
  const nome = d.nome || d.ragione_sociale || d.nome_impresa || 'Impresa';
  const tipo = d.tipo || d.categoria || '';
  const tel = d.telefono || '';
  const telHref = tel ? 'tel:' + tel.replace(/[\s\-().]/g, '') : '';
  const profiloHref = `/profilo-impresa.html?id=${d.id}`;
  const citta = [d.indirizzo || d.via, d.citta, d.provincia].filter(Boolean).join(', ');

  return `<div>
    <div class="popup-nome">${escHtml(nome)}</div>
    ${tipo ? `<div class="popup-tipo">${escHtml(tipo)}</div>` : ''}
    ${citta ? `<div class="popup-row">📍 ${escHtml(citta)}</div>` : ''}
    ${tel ? `<div class="popup-row">📞 <a href="${telHref}">${escHtml(tel)}</a></div>` : ''}
    <a href="${profiloHref}" class="popup-btn">Vedi profilo →</a>
  </div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── FILTRO MARKER ────────────────────────────────────────────────────────────
function filtraMarker(query) {
  const q = query.toLowerCase().trim();
  tuttiMarker.forEach(({ marker, nome, citta }) => {
    const match = !q || nome.toLowerCase().includes(q) || citta.toLowerCase().includes(q);
    if (match) { marker.addTo(map); } else { marker.remove(); }
  });
}

// ── MAIN ─────────────────────────────────────────────────────────────────────
(async function main() {
  try {
    const imprese = await caricaImprese();
    if (!imprese.length) {
      statusEl.textContent = '⚠️ Nessuna impresa trovata.';
      return;
    }

    let geocodificate = 0;
    let saltate = 0;
    statusEl.textContent = `⏳ Geocodifica 0 / ${imprese.length}…`;
    statusEl.className = 'loading';

    for (let i = 0; i < imprese.length; i++) {
      const d = imprese[i];
      const nome = d.nome || d.ragione_sociale || d.nome_impresa || '';
      if (!nome) { saltate++; continue; }

      // Costruisce la query per Nominatim: indirizzo + città, oppure solo città
      const via = d.indirizzo || d.via || '';
      const citta = d.citta || '';
      const prov = d.provincia || '';
      if (!citta && !via) { saltate++; continue; }

      const queryDettagliata = [via, citta, prov, 'Italia'].filter(Boolean).join(', ');
      const queryCitta = [citta, prov, 'Italia'].filter(Boolean).join(', ');

      // Prima prova indirizzo completo, poi solo città
      let coords = await geocodifica(queryDettagliata);
      if (!coords && citta) {
        coords = await geocodifica(queryCitta);
      }

      statusEl.textContent = `⏳ Geocodifica ${i + 1} / ${imprese.length}…`;

      if (coords) {
        const marker = L.marker([coords.lat, coords.lon], { icon: pinIcon })
          .bindPopup(buildPopup(d), { maxWidth: 280 });

        tuttiMarker.push({
          marker,
          nome: nome,
          citta: citta
        });
        marker.addTo(map);
        geocodificate++;
      } else {
        saltate++;
      }

      // Rispetta il rate limit di Nominatim: 1 richiesta al secondo
      // (la cache evita richieste duplicate, ma per le prime dobbiamo aspettare)
      await sleep(1100);
    }

    statusEl.textContent = `✅ ${geocodificate} imprese sulla mappa${saltate ? ' · ' + saltate + ' senza posizione' : ''}`;
    statusEl.className = 'done';

    // Se ci sono marker, adatta la mappa per mostrarli tutti
    if (tuttiMarker.length > 0) {
      const group = L.featureGroup(tuttiMarker.map(m => m.marker));
      map.fitBounds(group.getBounds().pad(0.1));
    }

  } catch(e) {
    statusEl.textContent = '❌ Errore: ' + e.message;
    statusEl.className = '';
    console.error(e);
  }
})();
</script>
