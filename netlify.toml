[build]
  publish = "."
  functions = "netlify/functions"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- ':!*.md' ':!docs/' ':!.gitignore' ':!*.sql'"

[build.environment]
  NODE_VERSION = "18"

[context.deploy-preview]
  command = "echo 'Deploy preview disabilitato per risparmiare crediti'"

[context.branch-deploy]
  command = "echo 'Branch deploy disabilitato per risparmiare crediti'"

[[redirects]]
  from = "/gestionale"
  to = "/gestionale-invito.html"
  status = 302
