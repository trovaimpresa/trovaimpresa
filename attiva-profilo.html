<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attiva il tuo profilo - TrovaImpresa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: linear-gradient(135deg, #FF6B35 0%, #b84a0a 100%);
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
    }
    .container { max-width: 620px; margin: 40px auto; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .header { background: linear-gradient(135deg, #FF6B35 0%, #b84a0a 100%); color: white; padding: 32px 24px; text-align: center; }
    .header h1 { font-size: 24px; margin-bottom: 8px; }
    .header p { font-size: 14px; opacity: 0.9; }
    .content { padding: 32px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 7px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; color: #333; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #FF6B35; box-shadow: 0 0 0 3px rgba(255,107,53,0.1); }
    .form-group input[readonly] { background: #f5f5f5; color: #777; cursor: not-allowed; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .required { color: #ff6b6b; }
    .section-title { font-size: 16px; font-weight: 700; color: #333; margin: 24px 0 16px; padding-top: 20px; border-top: 1px solid #f0f0f0; }
    .section-title:first-of-type { margin-top: 0; padding-top: 0; border-top: none; }
    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 44px; }
    .toggle-pw {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: #aaa;
      padding: 0; display: flex; align-items: center; transition: color 0.2s;
    }
    .toggle-pw:hover { color: #FF6B35; }
    .btn-submit { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; background: #FF6B35; color: white; margin-top: 8px; transition: background 0.2s; }
    .btn-submit:hover { background: #e55a25; }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg { background: #fff0f0; border: 1px solid #fca5a5; color: #c0392b; border-radius: 8px; padding: 12px 16px; font-size: 13px; margin-bottom: 16px; display: none; }
    .success-wrap { text-align: center; padding: 48px 32px; }
    .success-wrap .big-emoji { font-size: 56px; margin-bottom: 16px; }
    .success-wrap h2 { font-size: 22px; color: #333; margin-bottom: 10px; }
    .success-wrap p { font-size: 14px; color: #666; line-height: 1.6; }
    .loading-wrap { text-align: center; padding: 60px 32px; color: #999; }
    .loading-wrap .spin { font-size: 36px; margin-bottom: 12px; animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .not-found-wrap { text-align: center; padding: 48px 32px; }
    .not-found-wrap .icon { font-size: 48px; margin-bottom: 14px; }
    .not-found-wrap p { font-size: 14px; color: #666; }
    @media (max-width: 768px) {
      body { padding: 10px !important; }
      .container { margin: 16px auto !important; border-radius: 10px !important; }
      .header { padding: 20px 16px !important; }
      .header h1 { font-size: 1.2rem !important; }
      .content { padding: 16px !important; }
      .form-row { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🚀 Attiva il tuo profilo</h1>
    <p>Completa la registrazione e accedi al pannello TrovaImpresa</p>
  </div>

  <div class="content" id="main-content">
    <div class="loading-wrap" id="loading-state">
      <div class="spin">⏳</div>
      <div>Caricamento dati...</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://nacvrsgkyfavykxjxszu.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hY3Zyc2dreWZhdnlreGp4c3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTczNTYsImV4cCI6MjA4OTE3MzM1Nn0.o5S0HeDtG-hlCo1zfk4ILqtog7MT8_2B0EyjdiVzBic';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const tipoMap = {
    'artigiano':      'Artigiano',
    'impresa-edile':  'Impresa Edile',
    'grande-impresa': 'Grande Impresa',
    'negozio':        'Negozio Edile',
    'professionista': 'Professionista'
  };

  const params = new URLSearchParams(window.location.search);
  const emailParam = (params.get('email') || '').trim().toLowerCase();
  let leadId = null;

  async function init() {
    const content = document.getElementById('main-content');

    if (!emailParam) {
      content.innerHTML = `<div class="not-found-wrap"><div class="icon">⚠️</div><p>Link non valido: parametro email mancante.</p></div>`;
      return;
    }

    const { data: lead, error } = await sb
      .from('lead_imprese')
      .select('*')
      .ilike('email', emailParam)
      .maybeSingle();

    if (error || !lead) {
      content.innerHTML = `<div class="not-found-wrap"><div class="icon">🔍</div><p>Nessun lead trovato per l'email <strong>${emailParam}</strong>.<br>Contatta l'amministratore.</p></div>`;
      return;
    }

    if (lead.stato === 'attivato') {
      content.innerHTML = `<div class="not-found-wrap"><div class="icon">✅</div><p>Questo profilo è già stato attivato.<br><a href="login-impresa.html" style="color:#FF6B35;font-weight:700;">Accedi al pannello →</a></p></div>`;
      return;
    }

    leadId = lead.id;
    content.innerHTML = buildForm(lead);
    document.getElementById('btn-submit').addEventListener('click', submitForm);
    document.getElementById('toggle-pw1').addEventListener('click', () => togglePw('password'));
    document.getElementById('toggle-pw2').addEventListener('click', () => togglePw('conferma_password'));
  }

  function buildForm(lead) {
    return `
      <div class="error-msg" id="error-msg"></div>

      <div class="section-title">📋 I tuoi dati</div>

      <div class="form-group">
        <label>Nome attività <span class="required">*</span></label>
        <input type="text" id="nome_attivita" value="${escHtml(lead.nome_attivita || '')}" placeholder="Nome della tua attività">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" value="${escHtml(lead.email || emailParam)}" readonly>
        </div>
        <div class="form-group">
          <label>Telefono</label>
          <input type="tel" id="telefono" value="${escHtml(lead.telefono || '')}" placeholder="+39 000 0000000">
        </div>
      </div>
      <div class="form-group">
        <label>Città</label>
        <input type="text" id="citta" value="${escHtml(lead.citta || '')}" placeholder="Es. Roma">
      </div>

      <div class="section-title">🏗️ Categoria e mestiere</div>

      <div class="form-group">
        <label>Categoria <span class="required">*</span></label>
        <select id="categoria">
          <option value="">— Seleziona —</option>
          <option value="artigiano">🔨 Artigiano</option>
          <option value="impresa-edile">🏗️ Impresa Edile</option>
          <option value="grande-impresa">🏢 Grande Impresa</option>
          <option value="negozio">🏪 Negozio Edile</option>
          <option value="professionista">👔 Professionista</option>
        </select>
      </div>
      <div class="form-group">
        <label>Mestiere / Specializzazione <span class="required">*</span></label>
        <input type="text" id="mestiere" placeholder="Es. Muratore, Elettricista, Geometra...">
      </div>

      <div class="section-title">🔐 Crea la tua password</div>

      <div class="form-group">
        <label>Password <span class="required">*</span></label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Minimo 6 caratteri">
          <button type="button" class="toggle-pw" id="toggle-pw1">👁</button>
        </div>
      </div>
      <div class="form-group">
        <label>Conferma password <span class="required">*</span></label>
        <div class="password-wrapper">
          <input type="password" id="conferma_password" placeholder="Ripeti la password">
          <button type="button" class="toggle-pw" id="toggle-pw2">👁</button>
        </div>
      </div>

      <button class="btn-submit" id="btn-submit">🚀 Attiva il profilo</button>
      <p style="font-size:12px;color:#aaa;text-align:center;margin-top:10px;">Accederai automaticamente al pannello dopo l'attivazione</p>
    `;
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function togglePw(id) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  async function submitForm() {
    const nome_attivita = document.getElementById('nome_attivita').value.trim();
    const email        = document.getElementById('email').value.trim();
    const telefono     = document.getElementById('telefono').value.trim();
    const citta        = document.getElementById('citta').value.trim();
    const categoria    = document.getElementById('categoria').value;
    const mestiere     = document.getElementById('mestiere').value.trim();
    const password     = document.getElementById('password').value;
    const conferma     = document.getElementById('conferma_password').value;

    document.getElementById('error-msg').style.display = 'none';

    if (!nome_attivita || !categoria || !mestiere || !password || !conferma) {
      showError('⚠️ Compila tutti i campi obbligatori (*).');
      return;
    }
    if (password.length < 6) {
      showError('⚠️ La password deve essere di almeno 6 caratteri.');
      return;
    }
    if (password !== conferma) {
      showError('⚠️ Le password non coincidono.');
      return;
    }

    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.textContent = '⏳ Creazione account...';

    try {
      // 1. Crea account Auth
      const { data: authData, error: authError } = await sb.auth.signUp({ email, password });
      if (authError) throw new Error(authError.message);
      const user_id = authData.user.id;

      // 2. Login immediato
      btn.textContent = '⏳ Accesso in corso...';
      const { error: signInError } = await sb.auth.signInWithPassword({ email, password });
      if (signInError) throw new Error(signInError.message);

      // 3. Inserisce in imprese
      btn.textContent = '⏳ Salvataggio profilo...';
      const { error: insertError } = await sb.from('imprese').insert({
        user_id:       user_id,
        nome_attivita: nome_attivita,
        nome:          nome_attivita,
        email:         email,
        telefono:      telefono,
        citta:         citta,
        tipo:          tipoMap[categoria],
        mestieri:      mestiere ? [mestiere] : [],
        piano:         'free'
      });
      if (insertError) {
        if (insertError.code === '23505' || insertError.message.includes('duplicate key') || insertError.message.includes('imprese_email_key')) {
          throw new Error('⚠️ Questa email è già registrata. Accedi al pannello o usa un\'altra email.');
        }
        throw new Error(insertError.message);
      }

      // 4. Aggiorna stato lead ad "attivato"
      await sb.from('lead_imprese').update({ stato: 'attivato' }).eq('id', leadId);

      // 5. Successo
      document.getElementById('main-content').innerHTML = `
        <div class="success-wrap">
          <div class="big-emoji">🎉</div>
          <h2>Profilo attivato!</h2>
          <p>Benvenuto su TrovaImpresa, <strong>${escHtml(nome_attivita)}</strong>!<br>
          Stai per essere reindirizzato al tuo pannello...</p>
        </div>
      `;
      setTimeout(() => { window.location.href = 'pannello-impresa.html'; }, 2000);

    } catch (err) {
      btn.disabled = false;
      btn.textContent = '🚀 Attiva il profilo';
      showError('❌ ' + (err.message || 'Errore durante la registrazione. Riprova.'));
    }
  }

  init();
</script>
<script src="/cookie-banner.js"></script>
</body>
</html>
