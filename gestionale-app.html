<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gestionale — Impresa</title>
<style>
  :root{--bg:#f3f5f2;--surface:#fff;--ink:#19211d;--muted:#69756e;--line:#e3e8e3;--accent:#1f6f5c;--accent-d:#143f33;--accent-soft:#e7f1ed;--green:#2a7a4b;--danger:#c0392b;--shadow:0 4px 16px rgba(20,40,30,.07)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  .wrap{max-width:860px;margin:0 auto;padding:0 16px 100px}

  .landing-top{background:linear-gradient(135deg,#1f6f5c,#143f33);color:#fff;padding:26px 16px;text-align:center}
  .landing-top h1{font-size:21px;font-weight:800}.landing-top small{font-size:11px;opacity:.85;text-transform:uppercase;letter-spacing:1.4px;font-weight:700}
  .landing-sub{font-size:14px;color:var(--muted);text-align:center;margin:20px 0 16px;font-weight:500}
  .panels{display:grid;grid-template-columns:1fr;gap:14px;max-width:560px;margin:0 auto}
  @media(min-width:640px){.panels{grid-template-columns:repeat(2,1fr)}}
  .panel-card{position:relative;border:none;border-radius:18px;padding:22px 20px;color:#fff;cursor:pointer;text-align:left;box-shadow:0 8px 24px rgba(20,40,30,.14);font-family:inherit;display:flex;flex-direction:column;gap:6px;min-height:120px}
  .pc-del{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.2);border:none;color:#fff;width:32px;height:32px;border-radius:9px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .panel-card .ic{font-size:30px}.panel-card h2{font-size:20px;font-weight:800}.panel-card .meta{font-size:13px;font-weight:600;opacity:.95;margin-top:auto}
  .new-rep{display:block;margin:18px auto 0;max-width:560px;background:#fff;border:2px dashed #c3d3cb;color:var(--accent-d);border-radius:14px;padding:16px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;width:100%}

  header.top{background:linear-gradient(135deg,var(--accent),var(--accent-d));color:#fff;padding:16px;position:sticky;top:0;z-index:30;box-shadow:0 2px 10px rgba(0,0,0,.12)}
  .top-in{max-width:860px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{display:flex;align-items:center;gap:10px}
  .back{background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:9px;padding:9px 12px;font-size:13px;font-weight:700;cursor:pointer}
  .brand h1{font-size:18px;font-weight:700}.brand small{display:block;font-size:11px;opacity:.85;text-transform:uppercase}
  .btn-new{background:#fff;color:var(--accent-d);border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer}
  nav.tabs{display:flex;gap:2px;max-width:860px;margin:12px auto 0;overflow-x:auto}
  nav.tabs button{flex:0 0 auto;background:none;border:none;color:rgba(255,255,255,.78);font-size:14px;font-weight:600;padding:8px 13px 12px;cursor:pointer;border-bottom:3px solid transparent}
  nav.tabs button.active{color:#fff;border-bottom-color:#fff}

  section{display:none;padding-top:20px}section.active{display:block}
  .sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px}
  .sec-head h2{font-size:20px;font-weight:700}
  .add{background:var(--accent-soft);color:var(--accent-d);border:1px solid rgba(0,0,0,.06);border-radius:9px;padding:8px 13px;font-size:13px;font-weight:700;cursor:pointer}
  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
  .kpi .n{font-size:28px;font-weight:800}.kpi .l{font-size:12px;color:var(--muted);font-weight:600;margin-top:5px}
  .kpi.df .n{color:#c2410c}.kpi.ic .n{color:#2563eb}.kpi.ft .n{color:#16803d}

  .job{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow);border-left:5px solid var(--accent)}
  .job-cli{font-size:15px;font-weight:700}.job-desc{font-size:14px;color:#34403a;margin-top:3px}
  .stati{margin-top:10px}.st{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:700}
  .pall{width:13px;height:13px;border-radius:50%;display:inline-block;box-shadow:0 0 0 3px rgba(0,0,0,.05)}
  .pall.rosso{background:#e53935}.pall.verde{background:#22a558}
  .job-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:9px;font-size:12.5px;color:var(--muted);font-weight:500}
  .job-note{font-size:13px;color:#6a5b2e;margin-top:6px;background:#fbf6e6;padding:7px 10px;border-radius:9px}
  .job-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;padding-top:11px;border-top:1px solid var(--line)}
  .ja{font-size:12.5px;font-weight:600;padding:7px 11px;border-radius:8px;border:1px solid var(--line);background:#fff;color:#3a463f;cursor:pointer}
  .ja.go{background:var(--accent-soft);border-color:rgba(0,0,0,.06);color:var(--accent-d)}
  .ja.del{color:var(--danger);border-color:#f0d2cd;margin-left:auto}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:15px;box-shadow:var(--shadow);display:flex;justify-content:space-between;gap:10px;margin-bottom:10px}
  .card h3{font-size:15px;font-weight:700}.card p{font-size:13px;color:var(--muted);margin-top:3px}
  .card-acts{display:flex;flex-direction:column;gap:6px}
  .card-acts button{font-size:12px;font-weight:600;padding:6px 10px;border-radius:8px;border:1px solid var(--line);background:#fff;cursor:pointer;color:#3a463f}
  .card-acts button.del{color:var(--danger);border-color:#f0d2cd}
  .empty{text-align:center;color:var(--muted);padding:40px 16px}.empty .ic{font-size:38px;opacity:.7}.empty p{font-weight:600;margin-top:8px}.empty small{display:block;margin-top:5px}

  /* squadra */
  .person{display:flex;align-items:center;gap:9px;flex-wrap:wrap;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px;box-shadow:var(--shadow)}
  .pic{font-size:18px}.pname{font-weight:700;font-size:15px}
  .badge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.4px}
  .badge.inv{background:#fff4e6;color:#b45309}.badge.att{background:#e7f6ec;color:#1a7a3e}
  .mini{font-size:12px;font-weight:700;padding:6px 10px;border-radius:8px;border:1px solid var(--line);background:#fff;cursor:pointer;color:#46524b}
  .mini.del{color:var(--danger);border-color:#f0d2cd}
  .person .mini.del{margin-left:auto}
  .invite{flex-basis:100%;display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:#f6f9f6;border-radius:9px;padding:9px 11px;font-size:13px;color:#3a463f;margin-top:4px}
  .invite b{font-size:15px;letter-spacing:1px}
  .addp{display:flex;gap:8px;margin-top:6px}
  .addp input{flex:1;font-family:inherit;font-size:15px;padding:12px 13px;border:1px solid var(--line);border-radius:10px;background:#fcfdfc}
  .addp input:focus{outline:none;border-color:var(--accent);background:#fff}
  .addp button{flex:0 0 auto;background:var(--green);color:#fff;border:none;border-radius:10px;padding:0 16px;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer}

  .overlay{position:fixed;inset:0;background:rgba(20,30,25,.5);z-index:50;display:none;align-items:flex-end;justify-content:center}
  .overlay.open{display:flex}@media(min-width:640px){.overlay{align-items:center}}
  .sheet{background:#fff;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;border-radius:18px 18px 0 0;padding:20px 18px 28px}
  @media(min-width:640px){.sheet{border-radius:18px}}
  .sheet h3{font-size:18px;font-weight:700;margin-bottom:16px}
  .field{margin-bottom:13px}label{display:block;font-size:12.5px;font-weight:700;color:#46524b;margin-bottom:5px}
  input,select,textarea{width:100%;font-family:inherit;font-size:15px;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:#fcfdfc}
  textarea{resize:vertical;min-height:58px}input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);background:#fff}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .seg{display:flex;gap:6px}.seg button{flex:1;padding:10px 6px;border:1px solid var(--line);border-radius:10px;background:#fcfdfc;font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer}.seg button.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .picker{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .picker button{font-size:20px;width:42px;height:42px;border:1px solid var(--line);border-radius:10px;background:#fcfdfc;cursor:pointer}
  .picker button.on{border-color:var(--accent);box-shadow:0 0 0 2px rgba(31,111,92,.2)}
  .colors{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px}
  .colors button{width:30px;height:30px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px var(--line);cursor:pointer}
  .colors button.on{box-shadow:0 0 0 3px var(--accent)}
  .sheet-actions{display:flex;gap:10px;margin-top:8px}.sheet-actions button{flex:1;padding:13px;border-radius:11px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;border:none}
  .b-save{background:var(--accent);color:#fff}.b-cancel{background:#eef1ef;color:#48544d}
  .login-card{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:22px;max-width:420px;margin:40px auto}
  .login-card h2{font-size:18px;margin-bottom:14px}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;width:100%}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:11px;font-size:14px;font-weight:600;z-index:90;opacity:0;pointer-events:none;transition:opacity .2s}.toast.show{opacity:1}
  .hidden{display:none}
</style>
</head>
<body>
<div id="login" class="hidden"><div class="login-card"><h2>Accedi al gestionale</h2>
  <div class="field"><label>Email</label><input type="email" id="email"></div>
  <div class="field"><label>Password</label><input type="password" id="password"></div>
  <button class="btn" id="btn-login">Entra</button></div></div>

<div id="landing" class="hidden">
  <div class="landing-top"><div style="font-size:28px">🛠️</div><h1>Il tuo gestionale</h1><small>Scegli il reparto</small></div>
  <div class="wrap"><p class="landing-sub">Crea i reparti del tuo lavoro. Dentro ogni reparto gestisci lavori, condomini e la squadra.</p>
    <div class="panels" id="panels"></div>
    <button class="new-rep" data-act="new-mest">➕ Nuovo reparto</button>
  </div>
</div>

<div id="app" class="hidden">
  <header class="top"><div class="top-in">
    <div class="brand"><button class="back" data-act="home">← Reparti</button><div><h1 id="panel-name">—</h1><small id="panel-sub"></small></div></div>
    <button class="btn-new" data-act="new-job">+ Nuovo lavoro</button>
  </div>
  <nav class="tabs"><button data-tab="riepilogo" class="active">Riepilogo</button><button data-tab="lavori">Lavori</button><button data-tab="clienti">Condomini</button><button data-tab="squadra">Squadra</button></nav>
  </header>
  <div class="wrap">
    <section id="riepilogo" class="active">
      <div class="kpis">
        <div class="kpi df"><div class="n" id="k-df">0</div><div class="l">Da fare</div></div>
        <div class="kpi ic"><div class="n" id="k-ic">0</div><div class="l">In corso</div></div>
        <div class="kpi ft"><div class="n" id="k-ft">0</div><div class="l">Fatti</div></div>
      </div>
      <div style="font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:22px 0 10px">Prossimi da fare</div>
      <div id="prossimi"></div>
    </section>
    <section id="lavori"><div class="sec-head"><h2>Lavori</h2><button class="add" data-act="new-job">+ Nuovo</button></div><div id="jobs"></div></section>
    <section id="clienti"><div class="sec-head"><h2>Condomini</h2><button class="add" data-act="new-cli">+ Nuovo</button></div><div id="clis"></div></section>
    <section id="squadra"><div class="sec-head"><h2>Squadra di questo reparto</h2></div>
      <div id="sq-list"></div>
      <div class="addp"><input id="sq-nome" placeholder="Nome dipendente — es. Wahid"><button data-act="add-op">+ Invita</button></div>
    </section>
  </div>
</div>

<div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL="https://nacvrsgkyfavykxjxszu.supabase.co";
const SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hY3Zyc2dreWZhdnlreGp4c3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTczNTYsImV4cCI6MjA4OTE3MzM1Nn0.o5S0HeDtG-hlCo1zfk4ILqtog7MT8_2B0EyjdiVzBic";
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fdate=d=>{if(!d)return"—";const[y,m,g]=d.split("-");return g+"/"+m+"/"+y;};
const today=()=>new Date().toISOString().slice(0,10);
const statoL={da_fare:"Da fare",in_corso:"In corso",fatto:"Fatto"};
const ICONE=["🌳","🧹","🧱","🔧","⚡","🎨","🚿","🪚","🛠️","🌿","🏠","🪜"];
const COLORI=["#1f6f5c","#1565c0","#b9762f","#7c3aed","#d6336c","#2a9d8f","#e0a800","#69756e"];
function rand(){const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";let s="";for(let i=0;i<6;i++)s+=c[Math.floor(Math.random()*c.length)];return s;}
function inviteLink(c){return location.href.replace(/[^/]*$/,"")+"gestionale-invito.html?codice="+c;}
function copyLink(t){const ok=()=>toast("Link copiato ✔");const fb=()=>{const a=document.createElement("textarea");a.value=t;a.style.position="fixed";a.style.opacity="0";document.body.appendChild(a);a.focus();a.select();let d=false;try{d=document.execCommand("copy");}catch(_){}document.body.removeChild(a);d?ok():prompt("Copia il link a mano:",t);};(navigator.clipboard&&navigator.clipboard.writeText)?navigator.clipboard.writeText(t).then(ok).catch(fb):fb();}
let uid=null, cur=null, S={clienti:[],operatori:[],lavori:[],membri:[]}, editId=null, scelta={icona:"🛠️",colore:COLORI[0]};
function toast(t){const e=$("#toast");e.textContent=t;e.classList.add("show");clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove("show"),2000);}
function openSheet(h){$("#sheet").innerHTML=h;$("#overlay").classList.add("open");}
function closeSheet(){$("#overlay").classList.remove("open");}
$("#overlay").onclick=e=>{if(e.target.id==="overlay")closeSheet();};

function view(v){["login","landing","app"].forEach(id=>$("#"+id).classList.toggle("hidden",id!==v));}
async function refresh(session){if(session){uid=session.user.id;showLanding();}else{view("login");}}
sb.auth.onAuthStateChange((_e,s)=>refresh(s));
sb.auth.getSession().then(({data})=>refresh(data.session));
$("#btn-login").onclick=async()=>{const email=$("#email").value.trim(),password=$("#password").value;if(!email||!password){toast("Inserisci email e password");return;}const {error}=await sb.auth.signInWithPassword({email,password});if(error)toast("Accesso non riuscito");};

async function showLanding(){
  const {data,error}=await sb.from("gest_mestieri").select("*").order("ordine");
  if(error){toast("Errore: "+error.message);return;}
  const cnt=await Promise.all((data||[]).map(async m=>{
    const {count}=await sb.from("gest_lavori").select("id",{count:"exact",head:true}).eq("mestiere_id",m.id).neq("stato","fatto");
    return count||0;}));
  $("#panels").innerHTML=(data||[]).length?data.map((m,i)=>`<div class="panel-card" data-enter='${m.id}' data-m='${esc(JSON.stringify(m))}' style="background:linear-gradient(135deg,${m.colore},${m.colore})">
    <button class="pc-del" data-delm="${m.id}" title="Elimina reparto">🗑</button>
    <span class="ic">${m.icona||"🛠️"}</span><h2>${esc(m.nome)}</h2><span class="meta">${cnt[i]} da fare</span></div>`).join("")
    :`<div class="empty"><div class="ic">🧰</div><p>Ancora nessun reparto</p><small>Premi "Nuovo reparto" qui sotto</small></div>`;
  view("landing");
}

// --- nuovo reparto (mestiere) ---
function mestiereForm(){
  scelta={icona:"🛠️",colore:COLORI[0]};
  openSheet(`<h3>Nuovo reparto</h3>
    <div class="field"><label>Nome del reparto</label><input id="r-nome" placeholder="Es. Giardini, Pulizie, Edilizia"></div>
    <label>Icona</label><div class="picker" id="ic-pick">${ICONE.map(i=>`<button type="button" data-ic="${i}" class="${i===scelta.icona?'on':''}">${i}</button>`).join("")}</div>
    <label>Colore</label><div class="colors" id="col-pick">${COLORI.map((c,i)=>`<button type="button" data-col="${c}" style="background:${c}" class="${i===0?'on':''}"></button>`).join("")}</div>
    <div class="sheet-actions"><button class="b-cancel" data-act="close">Annulla</button><button class="b-save" data-act="save-mest">Crea reparto</button></div>`);
  $("#ic-pick").onclick=e=>{const b=e.target.closest("[data-ic]");if(!b)return;scelta.icona=b.dataset.ic;[...$("#ic-pick").children].forEach(x=>x.classList.toggle("on",x===b));};
  $("#col-pick").onclick=e=>{const b=e.target.closest("[data-col]");if(!b)return;scelta.colore=b.dataset.col;[...$("#col-pick").children].forEach(x=>x.classList.toggle("on",x===b));};
}
async function saveMestiere(){
  const nome=$("#r-nome").value.trim();if(!nome){toast("Scrivi il nome del reparto");return;}
  const {count}=await sb.from("gest_mestieri").select("id",{count:"exact",head:true});
  const {error}=await sb.from("gest_mestieri").insert({user_id:uid,nome,icona:scelta.icona,colore:scelta.colore,ordine:count||0});
  if(error){toast("Errore: "+error.message);return;}
  closeSheet();toast("Reparto creato ✔");showLanding();
}

async function enterPanel(m){
  cur=m;
  $("#panel-name").textContent=m.nome;$("#panel-sub").textContent="Reparto "+m.nome;
  document.documentElement.style.setProperty("--accent",m.colore||"#1f6f5c");
  $$("nav.tabs button").forEach((b,i)=>b.classList.toggle("active",i===0));
  $$("section").forEach(s=>s.classList.toggle("active",s.id==="riepilogo"));
  view("app");await loadData();
}
async function loadData(){
  const [cl,op,la,mb]=await Promise.all([
    sb.from("gest_clienti").select("*").eq("mestiere_id",cur.id).order("nome"),
    sb.from("gest_operatori").select("*").eq("mestiere_id",cur.id).order("nome"),
    sb.from("gest_lavori").select("*").eq("mestiere_id",cur.id).order("data_prevista"),
    sb.from("gest_membri").select("operatore_id,codice,stato")
  ]);
  S.clienti=cl.data||[];S.operatori=op.data||[];S.lavori=la.data||[];S.membri=mb.data||[];
  renderAll();
}
function cliById(id){return S.clienti.find(c=>c.id===id);}
function opById(id){return S.operatori.find(o=>o.id===id);}
function renderAll(){renderRiep();renderJobs();renderClis();renderSquadra();}

function jobCard(l){
  const c=cliById(l.cliente_id),o=opById(l.operatore_id),dove=l.dove||(c&&c.indirizzo)||"";
  const fatto=l.stato==="fatto";
  return `<div class="job">
    <div class="job-cli">${esc(c?c.nome:"—")}</div>
    ${l.descrizione?`<div class="job-desc">${esc(l.descrizione)}</div>`:""}
    <div class="stati"><span class="st"><i class="pall ${fatto?'verde':'rosso'}"></i>${fatto?"Fatto":(l.stato==="in_corso"?"In corso":"Da fare")}</span></div>
    <div class="job-meta">${dove?`<span>📍 ${esc(dove)}</span>`:""}<span>📅 ${fdate(l.data_prevista)}</span>${o?`<span>👷 ${esc(o.nome)}</span>`:""}${l.ore?`<span>⏱ ${l.ore} h</span>`:""}</div>
    ${l.note?`<div class="job-note">📝 ${esc(l.note)}</div>`:""}
    <div class="job-actions">
      ${dove?`<button class="ja" data-map="${esc(dove)}">🗺 Mappa</button>`:""}
      ${l.stato==="da_fare"?`<button class="ja go" data-stato="${l.id}" data-v="in_corso">▶ Avvia</button>`:""}
      ${!fatto?`<button class="ja go" data-stato="${l.id}" data-v="fatto">✔ Segna fatto</button>`:""}
      <button class="ja" data-edit="${l.id}">✏ Modifica</button>
      <button class="ja del" data-delj="${l.id}">🗑</button>
    </div></div>`;
}
function renderRiep(){
  $("#k-df").textContent=S.lavori.filter(l=>l.stato==="da_fare").length;
  $("#k-ic").textContent=S.lavori.filter(l=>l.stato==="in_corso").length;
  $("#k-ft").textContent=S.lavori.filter(l=>l.stato==="fatto").length;
  const p=S.lavori.filter(l=>l.stato!=="fatto").slice(0,5);
  $("#prossimi").innerHTML=p.length?p.map(jobCard).join(""):`<div class="empty"><div class="ic">✅</div><p>Niente in sospeso</p><small>Aggiungi un lavoro</small></div>`;
}
function renderJobs(){$("#jobs").innerHTML=S.lavori.length?S.lavori.map(jobCard).join(""):`<div class="empty"><div class="ic">📋</div><p>Nessun lavoro</p><small>Premi "+ Nuovo"</small></div>`;}
function renderClis(){
  $("#clis").innerHTML=S.clienti.length?S.clienti.map(c=>`<div class="card"><div><h3>${esc(c.nome)}</h3>
    <p>${c.indirizzo?"📍 "+esc(c.indirizzo)+"<br>":""}${c.referente?"👤 "+esc(c.referente)+" ":""}${c.telefono?"· 📞 "+esc(c.telefono):""}</p></div>
    <div class="card-acts"><button data-map="${esc(c.indirizzo||c.nome)}">🗺 Mappa</button><button data-editc="${c.id}">Modifica</button><button class="del" data-delc="${c.id}">Elimina</button></div></div>`).join("")
    :`<div class="empty"><div class="ic">🏢</div><p>Nessun condominio</p><small>Premi "+ Nuovo"</small></div>`;
}
function renderSquadra(){
  const mB=Object.fromEntries(S.membri.map(x=>[x.operatore_id,x]));
  $("#sq-list").innerHTML=S.operatori.length?S.operatori.map(o=>{
    const inv=mB[o.id], att=inv&&inv.stato==="attivo";
    return `<div class="person"><span class="pic">👷</span><span class="pname">${esc(o.nome)}</span>
      <span class="badge ${att?'att':'inv'}">${att?'Attivo':'Invitato'}</span>
      <button class="mini del" data-delo="${o.id}">Elimina</button>
      ${inv&&!att?`<div class="invite">Codice <b>${esc(inv.codice)}</b><button class="mini" data-link="${esc(inviteLink(inv.codice))}">Copia link</button></div>`:''}
    </div>`;}).join(""):`<div class="empty"><div class="ic">👥</div><p>Nessuna persona</p><small>Aggiungi un dipendente qui sotto</small></div>`;
}

function jobForm(l){
  editId=l?l.id:null;l=l||{stato:"da_fare"};
  const cliO=S.clienti.map(c=>`<option value="${c.id}" ${c.id===l.cliente_id?"selected":""}>${esc(c.nome)}</option>`).join("");
  const opO=S.operatori.map(o=>`<option value="${o.id}" ${o.id===l.operatore_id?"selected":""}>${esc(o.nome)}</option>`).join("");
  openSheet(`<h3>${editId?"Modifica lavoro":"Nuovo lavoro"}</h3>
    <div class="field"><label>Condominio / Cantiere</label><select id="j-cli"><option value="">— scegli —</option>${cliO}</select></div>
    <div class="field"><label>Cosa c'è da fare</label><textarea id="j-desc">${esc(l.descrizione||"")}</textarea></div>
    <div class="field"><label>Dove (vuoto = indirizzo del condominio)</label><input id="j-dove" value="${esc(l.dove||"")}"></div>
    <div class="row2"><div class="field"><label>Data prevista</label><input type="date" id="j-data" value="${l.data_prevista||""}"></div>
    <div class="field"><label>Chi ci va</label><select id="j-op"><option value="">— nessuno —</option>${opO}</select></div></div>
    <div class="field"><label>Stato</label><div class="seg" id="j-stato">${["da_fare","in_corso","fatto"].map(s=>`<button data-v="${s}" class="${l.stato===s?"on":""}">${statoL[s]}</button>`).join("")}</div></div>
    <div class="row2"><div class="field"><label>Ore</label><input type="number" id="j-ore" step="0.5" value="${l.ore||""}"></div>
    <div class="field"><label>Note</label><input id="j-note" value="${esc(l.note||"")}"></div></div>
    <div class="sheet-actions"><button class="b-cancel" data-act="close">Annulla</button><button class="b-save" data-act="save-job">${editId?"Salva":"Crea"}</button></div>`);
  $$("#j-stato button").forEach(b=>b.onclick=()=>{$$("#j-stato button").forEach(x=>x.classList.remove("on"));b.classList.add("on");});
}
async function saveJob(){
  const cliente_id=$("#j-cli").value;if(!cliente_id){toast("Scegli un condominio");return;}
  const on=$("#j-stato button.on");const stato=on?on.dataset.v:"da_fare";
  const row={user_id:uid,mestiere_id:cur.id,cliente_id,operatore_id:$("#j-op").value||null,descrizione:$("#j-desc").value.trim(),dove:$("#j-dove").value.trim(),data_prevista:$("#j-data").value||null,stato,ore:$("#j-ore").value||null,note:$("#j-note").value.trim(),data_fatto:stato==="fatto"?($("#j-data").value||today()):null};
  let error;
  if(editId){({error}=await sb.from("gest_lavori").update(row).eq("id",editId));}
  else{({error}=await sb.from("gest_lavori").insert(row));}
  if(error){toast("Errore: "+error.message);return;}
  closeSheet();toast(editId?"Aggiornato ✔":"Creato ✔");loadData();
}
function cliForm(c){
  editId=c?c.id:null;c=c||{};
  openSheet(`<h3>${editId?"Modifica condominio":"Nuovo condominio"}</h3>
    <div class="field"><label>Nome</label><input id="c-nome" value="${esc(c.nome||"")}" placeholder="Es. Condominio Via Roma 12"></div>
    <div class="field"><label>Indirizzo</label><input id="c-ind" value="${esc(c.indirizzo||"")}"></div>
    <div class="row2"><div class="field"><label>Referente</label><input id="c-ref" value="${esc(c.referente||"")}"></div>
    <div class="field"><label>Telefono</label><input id="c-tel" value="${esc(c.telefono||"")}"></div></div>
    <div class="sheet-actions"><button class="b-cancel" data-act="close">Annulla</button><button class="b-save" data-act="save-cli">${editId?"Salva":"Crea"}</button></div>`);
}
async function saveCli(){
  const nome=$("#c-nome").value.trim();if(!nome){toast("Scrivi il nome");return;}
  const row={user_id:uid,mestiere_id:cur.id,nome,indirizzo:$("#c-ind").value.trim(),referente:$("#c-ref").value.trim(),telefono:$("#c-tel").value.trim()};
  let error;
  if(editId){({error}=await sb.from("gest_clienti").update(row).eq("id",editId));}
  else{({error}=await sb.from("gest_clienti").insert(row));}
  if(error){toast("Errore: "+error.message);return;}
  closeSheet();toast(editId?"Aggiornato ✔":"Aggiunto ✔");loadData();
}
async function addOperatore(){
  const nome=$("#sq-nome").value.trim();if(!nome){toast("Scrivi il nome del dipendente");return;}
  const {data:op,error}=await sb.from("gest_operatori").insert({user_id:uid,mestiere_id:cur.id,nome}).select().single();
  if(error){toast("Errore: "+error.message);return;}
  const codice=rand();
  const {error:e2}=await sb.from("gest_membri").insert({impresa_id:uid,operatore_id:op.id,codice,stato:"invitato"});
  if(e2){toast("Errore invito: "+e2.message);return;}
  $("#sq-nome").value="";toast("Dipendente aggiunto, invito creato ✔");loadData();
}

document.addEventListener("click",async e=>{
  const t=e.target.closest("[data-act],[data-enter],[data-tab],[data-map],[data-stato],[data-edit],[data-delj],[data-editc],[data-delc],[data-delo],[data-delm],[data-link]");
  if(!t)return;
  if(t.dataset.enter){return enterPanel(JSON.parse(t.dataset.m));}
  if(t.dataset.delm){if(confirm("Eliminare questo reparto e tutto il suo contenuto (lavori, condomini, squadra)?")){await sb.from("gest_mestieri").delete().eq("id",t.dataset.delm);showLanding();}return;}
  if(t.dataset.tab){$$("nav.tabs button").forEach(x=>x.classList.remove("active"));t.classList.add("active");$$("section").forEach(s=>s.classList.toggle("active",s.id===t.dataset.tab));return;}
  if(t.dataset.map){window.open("https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(t.dataset.map),"_blank");return;}
  if(t.dataset.link){return copyLink(t.dataset.link);}
  const a=t.dataset.act;
  if(a==="home")return showLanding();
  if(a==="new-mest")return mestiereForm();
  if(a==="save-mest")return saveMestiere();
  if(a==="new-job")return jobForm(null);
  if(a==="new-cli")return cliForm(null);
  if(a==="save-job")return saveJob();
  if(a==="save-cli")return saveCli();
  if(a==="add-op")return addOperatore();
  if(a==="close")return closeSheet();
  if(t.dataset.edit)return jobForm(S.lavori.find(l=>l.id===t.dataset.edit));
  if(t.dataset.stato){const l=S.lavori.find(x=>x.id===t.dataset.stato);const upd={stato:t.dataset.v};if(t.dataset.v==="fatto"&&!l.data_fatto)upd.data_fatto=l.data_prevista||today();await sb.from("gest_lavori").update(upd).eq("id",l.id);toast("Stato: "+statoL[t.dataset.v]);loadData();return;}
  if(t.dataset.delj){if(confirm("Eliminare questo lavoro?")){await sb.from("gest_lavori").delete().eq("id",t.dataset.delj);loadData();}return;}
  if(t.dataset.editc)return cliForm(S.clienti.find(c=>c.id===t.dataset.editc));
  if(t.dataset.delc){if(confirm("Eliminare questo condominio?")){await sb.from("gest_clienti").delete().eq("id",t.dataset.delc);loadData();}return;}
  if(t.dataset.delo){if(confirm("Eliminare questo dipendente?")){await sb.from("gest_membri").delete().eq("operatore_id",t.dataset.delo);await sb.from("gest_operatori").delete().eq("id",t.dataset.delo);loadData();}return;}
});
</script>
</body>
</html>
