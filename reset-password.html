<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reimposta password - TrovaImpresa</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: linear-gradient(135deg, #1a4d2e 0%, #2a7a4b 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: white; margin-bottom: 32px; text-align: center; }
    .logo span { color: #FF6B35; }
    .card { background: white; border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .card h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: #1a4d2e; margin-bottom: 6px; }
    .card p { font-size: 0.9rem; color: #888; margin-bottom: 28px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #333; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 13px 14px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 0.95rem; font-family: inherit; color: #333; transition: border-color 0.2s; }
    .form-group input:focus { outline: none; border-color: #2a7a4b; box-shadow: 0 0 0 3px rgba(42,122,75,0.1); }
    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 44px; }
    .toggle-pw { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #aaa; padding: 0; display: flex; align-items: center; }
    .toggle-pw:hover { color: #2a7a4b; }
    .btn-save { width: 100%; padding: 14px; background: #2a7a4b; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.2s; margin-top: 8px; }
    .btn-save:hover { background: #1a4d2e; transform: translateY(-2px); }
    .btn-save:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .alert { border-radius: 8px; padding: 12px; font-size: 0.85rem; margin-bottom: 16px; text-align: center; }
    .alert-error { background: #fff0f0; border: 1px solid #ffcccc; color: #cc0000; }
    .alert-success { background: #e8f5e9; border: 1px solid #a8d5b5; color: #1a4d2e; }
    .back { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.85rem; margin-top: 20px; }
    .back:hover { color: white; }
    #form-area { display: none; }
    .loading { text-align: center; color: #888; font-size: 0.9rem; padding: 12px 0 20px; }
  </style>
</head>
<body>

  <div class="logo">Trova<span>Impresa</span></div>

  <div class="card">
    <h1>🔑 Nuova password</h1>
    <p>Scegli una nuova password per il tuo account</p>

    <div id="alert-box" style="display:none;"></div>

    <div id="loading" class="loading">⏳ Verifica del link in corso...</div>

    <div id="form-area">
      <div class="form-group">
        <label>Nuova password</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Minimo 8 caratteri">
          <button class="toggle-pw" type="button" onclick="togglePw('password')" tabindex="-1">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label>Conferma password</label>
        <div class="password-wrapper">
          <input type="password" id="password-confirm" placeholder="Ripeti la password">
          <button class="toggle-pw" type="button" onclick="togglePw('password-confirm')" tabindex="-1">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button type="button" class="btn-save" id="btn-save" onclick="salvaPassword()">💾 Salva nuova password</button>
    </div>
  </div>

  <a href="login-impresa.html" class="back">← Torna al login</a>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = supabase.createClient(
      'https://nacvrsgkyfavykxjxszu.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hY3Zyc2dreWZhdnlreGp4c3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTczNTYsImV4cCI6MjA4OTE3MzM1Nn0.o5S0HeDtG-hlCo1zfk4ILqtog7MT8_2B0EyjdiVzBic'
    );

    function mostraForm() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('form-area').style.display = 'block';
    }

    function mostraErrore() {
      document.getElementById('loading').style.display = 'none';
      showAlert('Link non valido o scaduto. Richiedi un nuovo link di reset.', 'error');
    }

    // 1. Controlla prima se c'è già una sessione attiva (es. token letto dall'hash)
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        mostraForm();
      } else {
        // 2. Altrimenti aspetta l'evento PASSWORD_RECOVERY
        supabaseClient.auth.onAuthStateChange((event, session) => {
          if (event === 'PASSWORD_RECOVERY') {
            mostraForm();
          } else if (event === 'SIGNED_OUT' || (!session && event !== 'INITIAL_SESSION')) {
            mostraErrore();
          }
        });
      }
    });

    function togglePw(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    async function salvaPassword() {
      const pw = document.getElementById('password').value;
      const pw2 = document.getElementById('password-confirm').value;
      clearAlert();

      if (pw.length < 8) { showAlert('La password deve essere di almeno 8 caratteri.', 'error'); return; }
      if (pw !== pw2) { showAlert('Le due password non coincidono.', 'error'); return; }

      const btn = document.getElementById('btn-save');
      btn.disabled = true;
      btn.textContent = '⏳ Salvataggio...';

      const { error } = await supabaseClient.auth.updateUser({ password: pw });

      if (error) {
        showAlert('Errore: ' + error.message, 'error');
        btn.disabled = false;
        btn.textContent = '💾 Salva nuova password';
      } else {
        showAlert('✅ Password aggiornata! Reindirizzamento al login...', 'success');
        setTimeout(() => { window.location.href = 'login-impresa.html'; }, 2000);
      }
    }

    function showAlert(msg, type) {
      const box = document.getElementById('alert-box');
      box.className = 'alert alert-' + type;
      box.textContent = msg;
      box.style.display = 'block';
    }

    function clearAlert() {
      document.getElementById('alert-box').style.display = 'none';
    }
  </script>
  <script src="/cookie-banner.js"></script>
<footer style="background:#1a3a2a;color:white;font-size:0.8rem;padding:15px;text-align:center">© 2026 TrovaImpresa – Alessio Pinto – Rieti (RI) – <a href="mailto:info@trovaimpresa.com" style="color:#a0d8b3">info@trovaimpresa.com</a> | <a href="/termini-condizioni.html" style="color:#a0d8b3">Termini</a> | <a href="/cookie-policy.html" style="color:#a0d8b3">Cookie Policy</a> | <a href="/privacy-policy.html" style="color:#a0d8b3">Privacy</a></footer>
</body>
</html>
