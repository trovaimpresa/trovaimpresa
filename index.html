<!-- COLONNA SINISTRA: INSERISCI RICERCA -->
<div class="col-candidature">
    <div class="col-title">Cerca lavoro</div>
    <div class="col-subtitle">Salva le tue ricerche</div>
    
    <form id="form-ricerca-candidato" onsubmit="salvaRicercaCandidato(event)">
        <div class="form-group">
            <label for="ricerca-nome">Nome *</label>
            <input type="text" id="ricerca-nome" placeholder="Es. Mario" required>
        </div>

        <div class="form-group">
            <label for="ricerca-cognome">Cognome *</label>
            <input type="text" id="ricerca-cognome" placeholder="Es. Rossi" required>
        </div>

        <div class="form-group">
            <label for="ricerca-eta">Età *</label>
            <input type="number" id="ricerca-eta" min="18" max="99" placeholder="Es. 35" required>
        </div>

        <div class="form-group">
            <label for="ricerca-sesso">Sesso *</label>
            <select id="ricerca-sesso" required>
                <option value="">-- Seleziona --</option>
                <option value="Uomo">Uomo</option>
                <option value="Donna">Donna</option>
            </select>
        </div>

        <div class="form-group">
            <label for="ricerca-mestiere">Mestiere *</label>
            <input type="text" id="ricerca-mestiere" placeholder="Es. Idraulico, Muratore..." required>
        </div>

        <div class="form-group">
            <label for="ricerca-citta">Città *</label>
            <input type="text" id="ricerca-citta" placeholder="Es. Roma" required>
        </div>

        <div class="form-group">
            <label for="ricerca-livello">Livello *</label>
            <select id="ricerca-livello" required>
                <option value="">-- Seleziona --</option>
                <option value="Apprendista">Apprendista</option>
                <option value="Specializzato">Specializzato</option>
            </select>
        </div>

        <div class="form-group">
            <label for="ricerca-descrizione">Descrizione / Biografia</label>
            <textarea id="ricerca-descrizione" placeholder="Racconta di te, esperienza, certificati..." style="min-height: 80px; resize: vertical;"></textarea>
        </div>

        <div class="form-group">
            <label for="ricerca-foto">📷 Foto Profilo</label>
            <input type="file" id="ricerca-foto" accept="image/*" placeholder="Seleziona una foto">
            <small style="color: #999; display: block; margin-top: 5px;">JPG, PNG - Max 5MB</small>
        </div>

        <div class="form-group">
            <label for="ricerca-curriculum">📄 Curriculum (PDF)</label>
            <input type="file" id="ricerca-curriculum" accept=".pdf,.doc,.docx" placeholder="Seleziona il curriculum">
            <small style="color: #999; display: block; margin-top: 5px;">PDF, DOC, DOCX - Max 10MB</small>
        </div>

        <div class="form-group">
            <button type="submit">💾 Salva ricerca</button>
        </div>
        <button type="button" class="sbtn" onclick="geolocalizzaCandidato()" style="width:100%; margin-top:8px; background:#FF6B35; color:white; border:none; padding:10px; border-radius:6px; cursor:pointer; font-weight:600;">📍 Localizzami</button>
    </form>
</div>
