<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<title>Notifiche — TrovaImpresa</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --verde:   #2a7a4b;
    --verde2:  #1f5e38;
    --verde3:  #e8f5ee;
    --arancio: #e8733a;
    --dark:    #1a1a1a;
    --mid:     #555;
    --light:   #999;
    --bg:      #f4f6f9;
    --border:  rgba(0,0,0,0.08);
    --shadow:  0 2px 16px rgba(0,0,0,0.07);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--dark); min-height:100vh; }

  /* SPINNER */
  #spinner-avvio {
    display:flex; min-height:100vh; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#1a3a2a,#2a7a4b);
  }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  /* HEADER */
  .page-header {
    background:linear-gradient(135deg,#1a3a2a 0%,#2a7a4b 100%);
    color:white; padding:20px 24px;
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    flex-wrap:wrap;
  }
  .page-header-left { display:flex; align-items:center; gap:14px; }
  .page-header h1 {
    font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:700;
  }
  .badge-premium {
    display:inline-block; background:#7b1fa2; color:white;
    font-size:0.7rem; font-weight:700; padding:3px 10px;
    border-radius:20px; letter-spacing:0.5px; vertical-align:middle;
  }
  .btn-torna {
    display:inline-flex; align-items:center; gap:6px;
    background:rgba(255,255,255,0.15); color:white;
    border:1px solid rgba(255,255,255,0.3); border-radius:10px;
    padding:9px 18px; font-size:0.88rem; font-weight:600;
    cursor:pointer; text-decoration:none; transition:background 0.2s;
  }
  .btn-torna:hover { background:rgba(255,255,255,0.25); }

  /* CONTENT */
  .content { max-width:860px; margin:0 auto; padding:28px 20px 60px; }

  /* TABS */
  .tabs {
    display:flex; gap:6px; flex-wrap:wrap; margin-bottom:24px;
    border-bottom:2px solid var(--border); padding-bottom:0;
  }
  .tab-btn {
    padding:10px 18px; border:none; background:none; font-family:'DM Sans',sans-serif;
    font-size:0.88rem; font-weight:600; color:var(--mid); cursor:pointer;
    border-bottom:3px solid transparent; margin-bottom:-2px; transition:all 0.15s;
    border-radius:8px 8px 0 0;
  }
  .tab-btn:hover { color:var(--verde); background:var(--verde3); }
  .tab-btn.active { color:var(--verde); border-bottom-color:var(--verde); background:white; }
  .tab-badge {
    display:inline-block; background:#7b1fa2; color:white;
    font-size:0.7rem; font-weight:700; padding:1px 6px;
    border-radius:10px; margin-left:6px;
  }

  /* TAB PANELS */
  .tab-panel { display:none; }
  .tab-panel.active { display:block; }

  /* CARDS */
  .notif-card {
    background:white; border-radius:14px; padding:16px 20px;
    margin-bottom:12px; box-shadow:var(--shadow);
    border-left:4px solid var(--border);
    display:flex; flex-direction:column; gap:6px;
    transition:box-shadow 0.15s;
  }
  .notif-card:hover { box-shadow:0 4px 24px rgba(0,0,0,0.11); }
  .notif-card.non-letta { background:#f3e5f5; border-left-color:#7b1fa2; }
  .notif-card-top { display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .notif-mittente { font-weight:700; font-size:0.95rem; color:var(--dark); }
  .notif-data { font-size:0.78rem; color:var(--light); white-space:nowrap; }
  .notif-testo { font-size:0.88rem; color:var(--mid); line-height:1.5; }
  .notif-badge {
    display:inline-block; font-size:0.72rem; font-weight:700;
    padding:2px 10px; border-radius:20px; white-space:nowrap;
  }
  .notif-badge.nuovo { background:#7b1fa2; color:white; }
  .notif-badge.letto { background:#e0e0e0; color:#666; }

  /* EMPTY STATE */
  .empty-state {
    text-align:center; padding:48px 20px; color:var(--light);
  }
  .empty-icon { font-size:2.5rem; margin-bottom:12px; }
  .empty-state p { font-size:0.9rem; }

  /* LOADING */
  .loading-state {
    text-align:center; padding:40px; color:var(--light); font-size:0.9rem;
  }
</style>
</head>
<body>

<!-- SPINNER -->
<div id="spinner-avvio">
  <div style="text-align:center;color:white">
    <div style="font-size:2.5rem;margin-bottom:16px;animation:spin 1s linear infinite;display:inline-block">⏳</div>
    <div style="font-size:1rem;opacity:0.85;font-weight:600">Caricamento...</div>
  </div>
</div>

<!-- PAGINA -->
<div id="pagina" style="display:none;">

  <div class="page-header">
    <div class="page-header-left">
      <div>
        <h1>🔔 Notifiche <span class="badge-premium">PREMIUM</span></h1>
        <div style="font-size:0.82rem;opacity:0.75;margin-top:2px;" id="header-nome-impresa">—</div>
      </div>
    </div>
    <a href="pannello-premium.html" class="btn-torna">← Torna al pannello</a>
  </div>

  <div class="content">

    <div class="tabs">
      <button class="tab-btn active" onclick="mostraTab('preventivi',this)">
        📋 Preventivi <span class="tab-badge" id="badge-preventivi" style="display:none"></span>
      </button>
      <button class="tab-btn" onclick="mostraTab('recensioni',this)">
        ⭐ Recensioni <span class="tab-badge" id="badge-recensioni" style="display:none"></span>
      </button>
      <button class="tab-btn" onclick="mostraTab('messaggi',this)">
        💬 Messaggi <span class="tab-badge" id="badge-messaggi" style="display:none"></span>
      </button>
      <button class="tab-btn" onclick="mostraTab('candidature',this)">
        👤 Candidature <span class="tab-badge" id="badge-candidature" style="display:none"></span>
      </button>
    </div>

    <div id="panel-preventivi" class="tab-panel active">
      <div class="loading-state">⏳ Caricamento...</div>
    </div>
    <div id="panel-recensioni" class="tab-panel">
      <div class="loading-state">⏳ Caricamento...</div>
    </div>
    <div id="panel-messaggi" class="tab-panel">
      <div class="loading-state">⏳ Caricamento...</div>
    </div>
    <div id="panel-candidature" class="tab-panel">
      <div class="loading-state">⏳ Caricamento...</div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/cookie-banner.js"></script>
<footer style="background:#1a3a2a;color:white;font-size:0.8rem;padding:15px;text-align:center">© 2026 TrovaImpresa – Alessio Pinto – Rieti (RI) – <a href="mailto:info@trovaimpresa.com" style="color:#a0d8b3">info@trovaimpresa.com</a> | <a href="/termini-condizioni.html" style="color:#a0d8b3">Termini</a> | <a href="/cookie-policy.html" style="color:#a0d8b3">Cookie Policy</a> | <a href="/privacy-policy.html" style="color:#a0d8b3">Privacy</a> | <a href="/contatti.html" style="color:#a0d8b3">Contatti</a></footer>

<script>
const SUPABASE_URL = 'https://nacvrsgkyfavykxjxszu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hY3Zyc2dreWZhdnlreGp4c3p1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1OTczNTYsImV4cCI6MjA4OTE3MzM1Nn0.o5S0HeDtG-hlCo1zfk4ILqtog7MT8_2B0EyjdiVzBic';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let impresaCorrente = null;

// ── AUTH ──────────────────────────────────────────────────────────────────────
supabaseClient.auth.onAuthStateChange(async (event, session) => {
  if (!session) {
    window.location.replace('login-impresa.html');
    return;
  }
  if (impresaCorrente) return; // già caricato
  let { data } = await supabaseClient.from('imprese').select('*').eq('user_id', session.user.id).maybeSingle();
  if (!data) {
    const { data: byEmail } = await supabaseClient.from('imprese').select('*').eq('email', session.user.email).maybeSingle();
    if (byEmail) {
      await supabaseClient.from('imprese').update({ user_id: session.user.id }).eq('id', byEmail.id);
      data = byEmail;
    }
  }
  if (!data) { window.location.replace('login-impresa.html'); return; }
  impresaCorrente = data;
  document.getElementById('header-nome-impresa').textContent = impresaCorrente.nome_attivita || impresaCorrente.email || '';
  document.getElementById('spinner-avvio').style.display = 'none';
  document.getElementById('pagina').style.display = 'block';
  caricaTutte();
});

// ── TABS ──────────────────────────────────────────────────────────────────────
function mostraTab(nome, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + nome).classList.add('active');
  btn.classList.add('active');
}

// ── RENDERING CARD ────────────────────────────────────────────────────────────
function formatData(str) {
  if (!str) return '—';
  const d = new Date(str);
  return isNaN(d) ? str : d.toLocaleDateString('it-IT', { day:'2-digit', month:'short', year:'numeric' });
}

function renderCard(mittente, data, testo, letto) {
  const cls = letto ? 'letto' : 'nuovo';
  const label = letto ? 'Letto' : 'Nuovo';
  return `
    <div class="notif-card ${letto ? '' : 'non-letta'}">
      <div class="notif-card-top">
        <span class="notif-mittente">${mittente || '—'}</span>
        <span class="notif-data">${formatData(data)}</span>
        <span class="notif-badge ${cls}">${label}</span>
      </div>
      <div class="notif-testo">${testo || 'Nessun contenuto'}</div>
    </div>`;
}

function renderLista(panelId, items, mapper) {
  const el = document.getElementById(panelId);
  if (!items || items.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>Nessuna notifica</p></div>`;
    return 0;
  }
  el.innerHTML = items.map(mapper).join('');
  return items.filter(i => !i.letto).length;
}

function mostraBadge(id, n) {
  const el = document.getElementById(id);
  if (n > 0) { el.textContent = n; el.style.display = 'inline-block'; }
  else { el.style.display = 'none'; }
}

// ── QUERY ─────────────────────────────────────────────────────────────────────
async function caricaTutte() {
  const id = impresaCorrente.id;

  // Preventivi
  const { data: preventivi } = await supabaseClient
    .from('preventivi').select('*').eq('impresa_id', id).order('created_at', { ascending: false });
  const nPreventivi = renderLista('panel-preventivi', preventivi, r =>
    renderCard(r.nome_cliente || r.email_cliente, r.created_at, r.descrizione || r.testo || r.tipo_lavoro, r.letto));
  mostraBadge('badge-preventivi', nPreventivi);

  // Recensioni
  const { data: recensioni } = await supabaseClient
    .from('feedback_clienti').select('*').eq('impresa_id', id).order('created_at', { ascending: false });
  const nRecensioni = renderLista('panel-recensioni', recensioni, r =>
    renderCard(r.nome_cliente || r.autore, r.created_at, r.testo || r.commento, r.letto));
  mostraBadge('badge-recensioni', nRecensioni);

  // Messaggi
  const { data: messaggi } = await supabaseClient
    .from('messaggi').select('*').eq('impresa_id', id).order('created_at', { ascending: false });
  const nMessaggi = renderLista('panel-messaggi', messaggi, r =>
    renderCard(r.nome_mittente || r.mittente || r.email, r.created_at, r.testo || r.messaggio, r.letto));
  mostraBadge('badge-messaggi', nMessaggi);

  // Candidature
  const { data: candidature } = await supabaseClient
    .from('candidati_lavoro').select('*').eq('impresa_id', id).order('created_at', { ascending: false });
  const nCandidature = renderLista('panel-candidature', candidature, r =>
    renderCard(r.nome || r.nome_candidato, r.created_at, r.messaggio || r.descrizione || r.ruolo, r.letto));
  mostraBadge('badge-candidature', nCandidature);
}
</script>
</body>
</html>
